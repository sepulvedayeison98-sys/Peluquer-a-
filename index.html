<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Status Barber Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Jost:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --white:#ffffff;--snow:#faf9f7;--beige:#f2ede6;
  --gold:#b8965a;--gold2:#9e7c42;--gold-lt:#e8d9be;
  --ink:#1a1714;--warm:#3d352c;--muted:#8c7d6e;--border:#e2d9cc;
}
html,body{height:100%}
body{
  background:var(--snow);color:var(--ink);
  font-family:'Jost',sans-serif;font-weight:300;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:32px 24px;
}

/* Background subtle pattern */
body::before{
  content:'';position:fixed;inset:0;
  background-image:radial-gradient(circle,var(--gold-lt) 1px,transparent 1px);
  background-size:28px 28px;opacity:0.35;pointer-events:none;z-index:0;
}

.container{position:relative;z-index:1;text-align:center;max-width:560px;width:100%}

/* Logo */
.logo{margin-bottom:12px}
.logo-main{
  font-family:'Playfair Display',serif;
  font-size:clamp(42px,10vw,72px);
  font-weight:700;color:var(--ink);
  letter-spacing:0.04em;line-height:1;
}
.logo-main em{font-style:italic;color:var(--gold);font-weight:400}
.logo-sub{
  font-family:'DM Mono',monospace;
  font-size:11px;letter-spacing:0.45em;text-transform:uppercase;
  color:var(--muted);margin-top:10px;
}

/* Divider */
.divider{
  display:flex;align-items:center;gap:14px;
  margin:28px auto;max-width:320px;
}
.divider::before,.divider::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(to right,transparent,var(--gold-lt),transparent);
}
.divider-dot{color:var(--gold);font-size:8px}

/* Cards */
.cards{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:8px}
@media(max-width:420px){.cards{grid-template-columns:1fr}}

.card{
  display:flex;flex-direction:column;
  border:1px solid var(--border);
  background:var(--white);
  padding:28px 20px 24px;
  text-decoration:none;
  transition:all 0.25s;
  position:relative;overflow:hidden;
}
.card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;
  height:2px;background:var(--gold-lt);
  transition:background 0.25s;
}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 32px rgba(184,150,90,0.15)}
.card:hover::after{background:var(--gold)}

.card-icon{
  font-size:28px;margin-bottom:16px;
  display:block;
}
.card-title{
  font-family:'Playfair Display',serif;
  font-size:20px;font-weight:500;color:var(--ink);
  margin-bottom:6px;
}
.card-title em{font-style:italic;color:var(--gold);font-weight:400}
.card-desc{
  font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:0.15em;text-transform:uppercase;
  color:var(--muted);line-height:1.6;
}
.card-arrow{
  margin-top:20px;
  font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--gold);
  display:flex;align-items:center;gap:8px;
}
.card-arrow::after{content:'→';transition:transform 0.2s}
.card:hover .card-arrow::after{transform:translateX(4px)}

/* Footer */
.foot{
  margin-top:40px;
  font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:0.2em;text-transform:uppercase;
  color:var(--muted);line-height:2;
}
</style>
</head>
<body>
<div class="container">

  <div class="logo">
    <div class="logo-main">Status <em>Barber</em></div>
    <div class="logo-sub">Studio · Medellín · Since 2023</div>
  </div>

  <div class="divider"><span class="divider-dot">◆</span></div>

  <div class="cards">
    <a class="card" href="agenda.html">
      <span class="card-icon">✂️</span>
      <div class="card-title">Reservar <em>cita</em></div>
      <div class="card-desc">Agenda tu visita, gestiona y reagenda tus citas</div>
      <div class="card-arrow">Entrar</div>
    </a>

    <a class="card" href="barberia.html">
      <span class="card-icon">📋</span>
      <div class="card-title">Panel del <em>barbero</em></div>
      <div class="card-desc">Gestión de citas, horario e ingresos</div>
      <div class="card-arrow">Entrar</div>
    </a>
  </div>

  <div class="foot">
    Carrera 55 24A-06 · Medellín, Bello<br>
    07:00 AM – 07:00 PM
  </div>

</div>
</body>
</html>
