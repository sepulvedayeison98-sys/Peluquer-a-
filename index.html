<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barber Style — Barbería de Élite · Medellín</title>
<meta name="description" content="Barber Style Studio. Cortes, barba y grooming de élite en Medellín. Reserva tu cita online en segundos.">
<meta name="theme-color" content="#0a0806">
<!-- Open Graph -->
<meta property="og:title" content="Barber Style — Barbería de Élite · Medellín">
<meta property="og:description" content="Cortes, barba y grooming de élite. Reserva tu cita online.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://barberstyle.co">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Jost:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:    #0a0806;
  --bg2:   #121009;
  --gold:  #c9a96e;
  --gold2: #a8854d;
  --gold-lt: rgba(201,169,110,.15);
  --white: #ffffff;
  --off:   rgba(255,255,255,.7);
  --dim:   rgba(255,255,255,.35);
  --border:rgba(201,169,110,.2);
}

html,body{height:100%}
body{
  background:var(--bg);
  color:var(--white);
  font-family:'Jost',sans-serif;
  font-weight:300;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px 24px;
  overflow-x:hidden;
}

/* Grain overlay */
body::before{
  content:'';
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  opacity:.4;
}

/* Gold line top */
body::after{
  content:'';
  position:fixed;top:0;left:0;right:0;height:2px;
  background:linear-gradient(to right,transparent,var(--gold),transparent);
  z-index:10;
}

.container{
  position:relative;z-index:1;
  text-align:center;
  max-width:600px;width:100%;
}

/* ── MONOGRAM ── */
.monogram{
  font-family:'Playfair Display',serif;
  font-size:clamp(80px,20vw,140px);
  font-weight:700;
  color:transparent;
  -webkit-text-stroke:1px rgba(201,169,110,.25);
  line-height:1;
  letter-spacing:-0.04em;
  margin-bottom:-16px;
  user-select:none;
  animation:fadeUp .9s cubic-bezier(.16,1,.3,1) both;
}

/* ── LOGO ── */
.logo{margin-bottom:8px;animation:fadeUp .9s .1s cubic-bezier(.16,1,.3,1) both}
.logo-main{
  font-family:'Playfair Display',serif;
  font-size:clamp(36px,8vw,58px);
  font-weight:700;
  color:var(--white);
  letter-spacing:0.06em;
  line-height:1;
}
.logo-main em{font-style:italic;color:var(--gold);font-weight:400}
.logo-sub{
  font-family:'DM Mono',monospace;
  font-size:10px;letter-spacing:0.55em;text-transform:uppercase;
  color:var(--dim);margin-top:10px;
}

/* Divider */
.divider{
  display:flex;align-items:center;gap:14px;
  margin:28px auto 32px;max-width:280px;
  animation:fadeUp .9s .2s cubic-bezier(.16,1,.3,1) both;
}
.divider::before,.divider::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(to right,transparent,var(--border),transparent);
}
.divider-dot{color:var(--gold);font-size:7px;letter-spacing:.3em}

/* ── CARDS ── */
.cards{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;
  animation:fadeUp .9s .3s cubic-bezier(.16,1,.3,1) both;
}
@media(max-width:420px){.cards{grid-template-columns:1fr}}

.card{
  display:flex;flex-direction:column;
  border:1px solid var(--border);
  background:rgba(255,255,255,.03);
  padding:28px 22px 24px;
  text-decoration:none;
  transition:all .3s cubic-bezier(.16,1,.3,1);
  position:relative;overflow:hidden;
  backdrop-filter:blur(8px);
}
.card::before{
  content:'';
  position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(201,169,110,.06) 0%,transparent 60%);
  opacity:0;transition:opacity .3s;
}
.card::after{
  content:'';position:absolute;bottom:0;left:0;right:0;
  height:2px;
  background:linear-gradient(to right,transparent,var(--gold),transparent);
  transform:scaleX(0);transition:transform .35s cubic-bezier(.16,1,.3,1);
}
.card:hover{
  transform:translateY(-4px);
  border-color:rgba(201,169,110,.4);
  background:rgba(255,255,255,.05);
  box-shadow:0 16px 48px rgba(0,0,0,.6),0 0 0 1px rgba(201,169,110,.1);
}
.card:hover::before{opacity:1}
.card:hover::after{transform:scaleX(1)}

.card-icon{
  font-size:26px;margin-bottom:14px;
  display:block;filter:grayscale(.3);
}
.card-title{
  font-family:'Playfair Display',serif;
  font-size:19px;font-weight:500;color:var(--white);
  margin-bottom:6px;
}
.card-title em{font-style:italic;color:var(--gold);font-weight:400}
.card-desc{
  font-family:'DM Mono',monospace;
  font-size:9px;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--dim);line-height:1.7;flex:1;
}
.card-arrow{
  margin-top:20px;
  font-family:'DM Mono',monospace;
  font-size:9px;letter-spacing:0.25em;text-transform:uppercase;
  color:var(--gold);
  display:flex;align-items:center;gap:8px;
  transition:gap .2s;
}
.card-arrow::after{content:'→'}
.card:hover .card-arrow{gap:14px}

/* ── FOOTER ── */
.foot{
  margin-top:36px;
  font-family:'DM Mono',monospace;
  font-size:9px;letter-spacing:0.25em;text-transform:uppercase;
  color:var(--dim);line-height:2.2;
  animation:fadeUp .9s .4s cubic-bezier(.16,1,.3,1) both;
}
.foot a{color:var(--gold);text-decoration:none}
.foot a:hover{text-decoration:underline}

/* ── KEYFRAMES ── */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

/* ── MOBILE ── */
@media(max-width:380px){
  .monogram{font-size:72px}
  .logo-main{font-size:32px}
  .card{padding:22px 16px 20px}
}
</style>
</head>
<body>
<div class="container">

  <div class="monogram">BS</div>

  <div class="logo">
    <div class="logo-main">Barber <em>Style</em></div>
    <div class="logo-sub">Studio · Medellín · Est. 2023</div>
  </div>

  <div class="divider"><span class="divider-dot">◆</span></div>

  <div class="cards">
    <a class="card" href="reservas.html">
      <span class="card-icon">✂️</span>
      <div class="card-title">Reservar <em>cita</em></div>
      <div class="card-desc">Agenda tu visita, cancela o reagenda cuando necesites</div>
      <div class="card-arrow">Reservar</div>
    </a>
    <a class="card" href="panel.html">
      <span class="card-icon">📋</span>
      <div class="card-title">Panel del <em>barbero</em></div>
      <div class="card-desc">Gestión de citas, horario e ingresos del negocio</div>
      <div class="card-arrow">Entrar</div>
    </a>
  </div>

  <div class="foot">
    Carrera 55 24A-06 · Medellín, Bello<br>
    07:00 AM – 07:00 PM ·
    <a href="mailto:barbero@barberstyle.co">barbero@barberstyle.co</a>
  </div>

</div>
</body>
</html>
